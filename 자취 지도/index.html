<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>자취:ON 공유 맛집 지도</title>
  <style>
    :root{--green:#137a52;--ink:#26342b;--cream:#f6f3eb;--line:#e4e2da}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;color:var(--ink);background:var(--cream)}button,input,select{font:inherit}.top{height:64px;display:flex;align-items:center;padding:0 3vw;border-bottom:1px solid var(--line)}.top img{height:48px;mix-blend-mode:multiply}.intro{height:126px;padding:21px 3vw;display:flex;justify-content:space-between;align-items:center}.intro h1{margin:0;font-family:Georgia,"Noto Serif KR",serif;font-size:34px;line-height:1.1}.intro h1 em{color:var(--green);font-style:normal}.intro p{margin:8px 0 0;color:#747b75;font-size:13px}.count{padding:15px 20px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 8px 24px #26342b12}.count b{color:var(--green);font-size:24px}.shell{height:calc(100vh - 210px);min-height:580px;margin:0 2vw 20px;display:grid;grid-template-columns:320px 1fr;overflow:hidden;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:0 18px 55px #26342b1a}.side{padding:24px 16px;overflow:hidden;border-right:1px solid var(--line)}.head{display:flex;align-items:center;justify-content:space-between;padding:0 7px 16px}.head small{color:var(--green);font-weight:800}.head h2{margin:3px 0 0;font-family:Georgia,"Noto Serif KR",serif;font-size:24px}.add{width:40px;height:40px;border:0;border-radius:50%;background:var(--green);color:#fff;font-size:24px;cursor:pointer}.add.on{background:var(--ink)}.list{height:calc(100% - 62px);overflow:auto}.item{width:100%;display:flex;gap:11px;align-items:center;padding:12px 9px;border:1px solid transparent;border-radius:13px;background:transparent;text-align:left;cursor:pointer}.item:hover,.item.active{background:#f0f7f2;border-color:#d3e6d8}.num{width:31px;height:31px;display:grid;place-items:center;flex:none;border-radius:10px 10px 10px 2px;color:#fff;font-size:11px;font-weight:800}.copy{min-width:0;display:flex;flex:1;flex-direction:column}.copy small{color:var(--green);font-weight:800}.copy b{margin:2px 0;font-size:14px}.copy span{overflow:hidden;color:#939892;font-size:11px;text-overflow:ellipsis;white-space:nowrap}.mapWrap{position:relative;min-width:0;background:#e7eee8}#map{width:100%;height:100%}.pin{width:42px;height:46px;display:grid;place-items:center;border:4px solid #fff;border-radius:16px 16px 16px 3px;background:var(--pin);color:#fff;box-shadow:0 5px 16px #26342b55;transform:rotate(-45deg);cursor:pointer}.pin span{transform:rotate(45deg)}.guide{position:absolute;top:16px;left:50%;z-index:5;padding:11px 17px;border-radius:12px;background:#fffffff2;box-shadow:0 8px 26px #26342b33;color:var(--green);font-size:13px;font-weight:800;transform:translateX(-50%)}.detail{position:absolute;left:20px;bottom:20px;z-index:5;width:min(580px,calc(100% - 40px));display:flex;gap:13px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:16px;background:#fffffff5;box-shadow:0 12px 36px #26342b33}.badge{width:38px;height:38px;display:grid;place-items:center;flex:none;border-radius:12px;color:#fff}.detailText{min-width:0;display:flex;flex:1;flex-direction:column}.detailText small{color:var(--green);font-weight:800}.detailText b{margin:2px 0}.detailText span{color:#7c847e;font-size:11px}.detailText em{margin-top:3px;font-size:12px;font-style:normal}.naver{flex:none;padding:9px 11px;border-radius:9px;background:#03c75a;color:#fff;font-size:11px;font-weight:800;text-decoration:none}.modal{position:absolute;left:20px;bottom:20px;z-index:7;width:min(450px,calc(100% - 40px));padding:18px;border-radius:17px;background:#fff;box-shadow:0 16px 48px #26342b44}.modalHead{display:flex;justify-content:space-between}.modal h3{margin:2px 0 0;font-family:Georgia,"Noto Serif KR",serif}.close{width:30px;height:30px;border:0;border-radius:50%;background:#eef2ed}.address{padding:9px;margin:12px 0;border-radius:8px;background:#f1f6f1;color:#657068;font-size:11px}.modal label{display:flex;flex-direction:column;gap:5px;margin-top:9px;color:#59635c;font-size:11px;font-weight:800}.modal input,.modal select{height:39px;padding:0 10px;border:1px solid #dce1db;border-radius:9px}.row{display:grid;grid-template-columns:110px 1fr;gap:9px}.save{width:100%;margin-top:12px;padding:11px;border:0;border-radius:10px;background:var(--green);color:#fff;font-weight:800}.hidden{display:none!important}@media(max-width:760px){.intro{height:110px;padding:15px 16px}.intro h1{font-size:27px}.count{display:none}.shell{height:auto;min-height:0;margin:0 8px 14px;grid-template-columns:1fr}.side{height:210px;border-right:0;border-bottom:1px solid var(--line)}.list{display:flex;gap:7px}.item{min-width:250px}.mapWrap{height:65vh;min-height:470px}.detail{left:10px;bottom:10px;width:calc(100% - 20px);flex-wrap:wrap}.naver{width:100%;text-align:center}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top"><img src="public/jachwion-logo.png" alt="자취온" /></header>
  <section class="intro"><div><h1>혼자 알기 아까운 <em>진짜 맛집</em></h1><p>자취생들이 직접 저장한 서울 맛집을 한 지도에서 만나보세요.</p></div><div class="count"><b id="total">0</b> 저장된 맛집</div></section>
  <main class="shell">
    <aside class="side"><div class="head"><div><small>공유 맛집</small><h2>서울 맛집 리스트</h2></div><button id="addButton" class="add" aria-label="맛집 추가">+</button></div><div id="list" class="list"></div></aside>
    <section class="mapWrap"><div id="map" aria-label="서울 공유 맛집 지도"></div><div id="guide" class="guide hidden">지도에서 맛집 위치를 클릭하세요</div><article id="detail" class="detail"></article>
      <form id="form" class="modal hidden"><div class="modalHead"><div><small>새 맛집 추가</small><h3>이 장소를 저장할까요?</h3></div><button type="button" id="close" class="close">×</button></div><p id="address" class="address"></p><label>식당 이름<input id="name" required placeholder="예: 우리동네 작은식당" /></label><div class="row"><label>분류<select id="category"><option>한식</option><option>일식</option><option>양식</option><option>분식</option><option>건강식</option><option>기타</option></select></label><label>한줄 메모<input id="note" placeholder="추천 메뉴나 분위기" /></label></div><button class="save">맛집 마커 저장</button></form>
    </section>
  </main>
  <script>
    const basePlaces=[
      [1,"광화문 집밥상","한식","서울 종로구 광화문",37.5720,126.9769,"든든한 한 상이 생각날 때 찾는 곳","#ff6b4a"],[2,"을지로 골목면옥","한식","서울 중구 을지로",37.5661,126.9910,"퇴근 후 들르기 좋은 골목 식당","#f4b642"],[3,"연남 작은키친","양식","서울 마포구 연남동",37.5624,126.9234,"오늘의 파스타가 맛있는 작은 주방","#22a06b"],[4,"해방촌 달빛식탁","양식","서울 용산구 용산동2가",37.5421,126.9872,"야경과 함께 즐기는 따뜻한 한 끼","#e94f64"],[5,"성수 작은식탁","한식","서울 성동구 성수동",37.5445,127.0567,"혼밥하기 편하고 제육이 맛있어요","#ff6b4a"],[6,"건대 하루카레","일식","서울 광진구 화양동",37.5410,127.0680,"진한 소스와 바삭한 토핑","#f4b642"],[7,"회기 따뜻한국밥","한식","서울 동대문구 회기동",37.5912,127.0521,"늦은 시간에도 든든한 국밥","#22a06b"],[8,"성신여대 골목분식","분식","서울 성북구 동선동",37.5927,127.0163,"떡볶이와 튀김이 좋은 단골집","#e94f64"],[9,"공릉 숲길덮밥","일식","서울 노원구 공릉동",37.6254,127.0731,"산책 후 먹기 좋은 덮밥","#ff6b4a"],[10,"연신내 밤마실포차","한식","서울 은평구 갈현동",37.6191,126.9212,"친구들과 편하게 한잔하기 좋은 곳","#f4b642"],[11,"신촌 혼밥연구소","한식","서울 서대문구 창천동",37.5561,126.9370,"메뉴가 다양하고 혼자 먹기 편해요","#22a06b"],[12,"문래 철공소피자","양식","서울 영등포구 문래동",37.5171,126.8962,"바삭한 도우가 매력적","#e94f64"],[13,"신도림 퇴근김밥","분식","서울 구로구 신도림동",37.5091,126.8894,"퇴근길 포장하기 좋은 김밥","#ff6b4a"],[14,"사당 소담면가","한식","서울 동작구 사당동",37.4772,126.9814,"깔끔한 국수와 만두","#f4b642"],[15,"샤로수길 포케룸","건강식","서울 관악구 봉천동",37.4782,126.9524,"재료가 신선하고 양도 든든해요","#22a06b"],[16,"교대 골목초밥","일식","서울 서초구 서초동",37.4934,127.0142,"부담 없는 오늘의 초밥","#e94f64"],[17,"역삼 직장인백반","한식","서울 강남구 역삼동",37.4995,127.0330,"매일 바뀌는 반찬","#ff6b4a"],[18,"잠실 호수라멘","일식","서울 송파구 잠실동",37.5111,127.0854,"산책 뒤 먹기 좋은 라멘","#f4b642"],[19,"천호 야채곱창","한식","서울 강동구 천호동",37.5386,127.1263,"매콤하게 볶아낸 인기 메뉴","#22a06b"],[20,"발산 오늘의파스타","양식","서울 강서구 마곡동",37.5595,126.8373,"편안한 데일리 파스타","#e94f64"],[21,"목동 푸른샐러드","건강식","서울 양천구 목동",37.5251,126.8754,"가볍지만 든든한 샐러드","#22a06b"]
    ].map(([id,name,category,address,lat,lng,note,color])=>({id,name,category,address,lat,lng,note,color}));
    let places=[...basePlaces,...JSON.parse(localStorage.getItem("jachwion-index-places")||"[]")],map,markers=[],active=places[0],adding=false,draft=null;
    const $=id=>document.getElementById(id), colors=["#ff6b4a","#f4b642","#22a06b","#e94f64"];
    function render(){ $("total").textContent=places.length; $("list").innerHTML=places.map((p,i)=>`<button class="item ${p.id===active.id?"active":""}" data-id="${p.id}"><span class="num" style="background:${p.color}">${i+1}</span><span class="copy"><small>${p.category}</small><b>${p.name}</b><span>${p.address}</span></span>♥</button>`).join(""); $("list").querySelectorAll("button").forEach(b=>b.onclick=()=>select(+b.dataset.id)); renderDetail(); }
    function renderDetail(){ const p=active; $("detail").innerHTML=`<span class="badge" style="background:${p.color}">♥</span><span class="detailText"><small>${p.category}</small><b>${p.name}</b><span>${p.address}</span><em>${p.note}</em></span><a class="naver" target="_blank" rel="noreferrer" href="https://map.naver.com/p/search/${encodeURIComponent(p.name+" "+p.address)}">네이버 지도에서 보기 ↗</a>`; }
    function select(id){ active=places.find(p=>p.id===id)||places[0]; render(); if(map){map.panTo(new naver.maps.LatLng(active.lat,active.lng));map.setZoom(15)} }
    function syncMarkers(){ markers.forEach(m=>m.setMap(null)); markers=places.map(p=>{const m=new naver.maps.Marker({map,position:new naver.maps.LatLng(p.lat,p.lng),title:p.name,icon:{content:`<button class="pin" aria-label="${p.name}" style="--pin:${p.color}"><span>♥</span></button>`,anchor:{x:21,y:46}}});naver.maps.Event.addListener(m,"click",()=>{active=p;render()});return m}) }
    window.initMap=()=>{map=new naver.maps.Map("map",{center:new naver.maps.LatLng(37.5665,126.978),zoom:11,zoomControl:true,zoomControlOptions:{position:naver.maps.Position.TOP_RIGHT}});syncMarkers();naver.maps.Event.addListener(map,"click",e=>{if(!adding)return;draft={lat:e.coord.lat(),lng:e.coord.lng(),address:"주소를 확인하는 중..."};openForm();naver.maps.Service.reverseGeocode({coords:e.coord,orders:"roadaddr,addr"},(_,r)=>{const a=r.v2&&r.v2.address;draft.address=a&&(a.roadAddress||a.jibunAddress)||"주소를 찾을 수 없는 위치";$("address").textContent=draft.address})})};
    function openForm(){ $("address").textContent=draft.address;$("form").classList.remove("hidden");$("guide").classList.add("hidden");$("name").focus() }
    $("addButton").onclick=()=>{adding=!adding;draft=null;$("addButton").classList.toggle("on",adding);$("addButton").textContent=adding?"×":"+";$("guide").classList.toggle("hidden",!adding);$("form").classList.add("hidden")};
    $("close").onclick=()=>{$("form").classList.add("hidden");draft=null};
    $("form").onsubmit=e=>{e.preventDefault();if(!draft)return;const p={id:Math.max(...places.map(p=>p.id))+1,name:$("name").value.trim(),category:$("category").value,address:draft.address,lat:draft.lat,lng:draft.lng,note:$("note").value.trim()||"함께 저장한 새로운 맛집이에요",color:colors[places.length%colors.length]};places.push(p);localStorage.setItem("jachwion-index-places",JSON.stringify(places.slice(basePlaces.length)));active=p;adding=false;draft=null;$("form").reset();$("form").classList.add("hidden");$("addButton").classList.remove("on");$("addButton").textContent="+";syncMarkers();render()};
    render();
    const script=document.createElement("script");script.src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=6q192ubw7f&submodules=geocoder&callback=initMap";document.head.appendChild(script);
  </script>
</body>
</html>
