  <header><img src="public/jachwion-logo-transparent.png" alt="자취:ON"></header>
  <section class="hero"><div><h1>혼자 알기 아까운 <span>진짜 맛집</span></h1><p>자취생들이 직접 저장한 서울 맛집을 한 지도에서 만나보세요.</p><div class="filters"><div class="filter-set"><span class="filter-label">보기</span><button class="chip active" data-primary="top7">TOP 7</button><button class="chip" data-primary="all">전체 보기</button></div><div class="filter-set"><span class="filter-label">카테고리</span><button class="chip" data-category="가성비 맛집">가성비 맛집</button><button class="chip" data-category="데이트 맛집">데이트 맛집</button><button class="chip" data-category="안주 맛집">안주 맛집</button></div><button id="savedFilter" class="chip saved">♡ 저장한 맛집 <span id="savedCount">0</span></button></div></div><div class="count"><strong id="visibleCount">0</strong>표시 중</div></section>
  <main><aside class="sidebar"><div class="sidehead"><div><div class="eyebrow">공유 맛집</div><h2>서울 맛집 리스트</h2></div><button class="add" id="openAdd" aria-label="맛집 추가">+</button></div><div class="restaurant-list" id="list"></div></aside><section class="mapwrap"><div id="map" class="map"></div><div id="mapError" class="map-error"></div><div id="mapPick" class="map-pick">지도에서 가게 위치를 클릭해 주세요 · 취소 Esc</div><article id="detail" class="detail hidden"><div id="detailBadge" class="heartmark">♥</div><div><div id="detailTags" class="tags"></div><h3 id="detailName"></h3><div id="detailAddress" class="small"></div></div><div class="actions"><button id="likeBtn" class="action">👍 <span></span></button><button id="dislikeBtn" class="action">👎 <span></span></button><button id="saveBtn" class="action">♡ 저장</button><a id="naverLink" class="naver-link" target="_blank" rel="noreferrer">네이버 지도에서 보기 ↗</a></div></article></section></main>
  <div id="modal" class="modal"><div class="dialog"><div class="dialog-head"><h2>맛집 추가</h2><button class="close" id="closeModal">×</button></div><div class="tabs"><button class="tab active" data-tab="search">가게 이름 검색</button><button class="tab" data-tab="map">지도에서 위치 선택</button></div><section id="searchPane"><div class="searchrow"><input id="searchInput" placeholder="예: 성수 소문난성수감자탕"><button id="searchBtn" class="searchbtn">검색</button></div><div id="searchStatus" class="status"></div><div id="results" class="results"></div></section><section id="mapPane" hidden><p>버튼을 누른 뒤 지도에서 식당 위치를 클릭하세요.</p><button id="startPick" class="submit">지도에서 위치 선택</button></section><form id="placeForm" hidden><div id="draft" class="draft"></div><label for="placeName">가게 이름</label><input id="placeName" required><label>맛집 카테고리 (복수 선택 가능)</label><div class="tag-options"><label class="tag-option"><input type="checkbox" name="tags" value="가성비 맛집"><span>가성비 맛집</span></label><label class="tag-option"><input type="checkbox" name="tags" value="데이트 맛집"><span>데이트 맛집</span></label><label class="tag-option"><input type="checkbox" name="tags" value="안주 맛집"><span>안주 맛집</span></label></div><label for="foodCategory">음식 종류</label><input id="foodCategory" placeholder="한식, 양식, 카페 등"><label for="note">한 줄 소개</label><textarea id="note" rows="2" placeholder="추천 메뉴나 특징을 적어주세요"></textarea><div id="formStatus" class="status"></div><button class="submit" type="submit">이 맛집 등록하기</button></form></div></div><div id="toast" class="toast"></div>
  <div id="adminEditModal" class="modal"><div class="dialog"><div class="dialog-head"><h2>맛집 정보 수정</h2><button class="close" data-close-admin-edit>×</button></div><form id="adminEditForm"><input id="adminEditId" type="hidden"><label for="adminEditName">가게 이름</label><input id="adminEditName" required><label for="adminEditAddress">상세 주소</label><input id="adminEditAddress" required><label for="adminEditDong">행정동</label><input id="adminEditDong" required><label for="adminEditFood">음식 종류</label><input id="adminEditFood"><label>맛집 카테고리</label><div class="tag-options"><label class="tag-option"><input type="checkbox" name="adminTags" value="가성비 맛집"><span>가성비 맛집</span></label><label class="tag-option"><input type="checkbox" name="adminTags" value="데이트 맛집"><span>데이트 맛집</span></label><label class="tag-option"><input type="checkbox" name="adminTags" value="안주 맛집"><span>안주 맛집</span></label></div><label for="adminEditNote">한 줄 소개</label><textarea id="adminEditNote" rows="2"></textarea><div id="adminEditStatus" class="status"></div><button class="submit" type="submit">수정 내용 저장</button></form></div></div>
  <script>
    const seed=[['광화문 집밥상','한식','서울 종로구 광화문','종로구 사직동',37.5759,126.9768,['가성비 맛집'],38,2],['을지로 골목면옥','한식','서울 중구 을지로','중구 을지로동',37.566,126.991,['가성비 맛집','안주 맛집'],31,4],['연남 작은키친','양식','서울 마포구 연남동','마포구 연남동',37.5628,126.9257,['데이트 맛집'],43,3],['해방촌 달빛식탁','양식','서울 용산구 용산동2가','용산구 용산2가동',37.5427,126.987,['데이트 맛집','안주 맛집'],27,5],['성수 작은식탁','한식','서울 성동구 성수동','성동구 성수2가제3동',37.5445,127.056,['가성비 맛집','데이트 맛집'],46,3],['망원 오늘분식','분식','서울 마포구 망원동','마포구 망원1동',37.5562,126.901,['가성비 맛집'],25,1],['신림 든든밥집','한식','서울 관악구 신림동','관악구 신림동',37.4842,126.929,['가성비 맛집'],32,2],['잠실 호수다이닝','양식','서울 송파구 잠실동','송파구 잠실3동',37.5133,127.101,['데이트 맛집'],41,6],['건대 밤거리포차','주점','서울 광진구 화양동','광진구 화양동',37.5414,127.069,['안주 맛집'],29,7],['혜화 소담카레','일식','서울 종로구 명륜동','종로구 혜화동',37.5821,127.001,['가성비 맛집','데이트 맛집'],35,2],['노량진 한끼식당','한식','서울 동작구 노량진동','동작구 노량진1동',37.5135,126.943,['가성비 맛집'],22,4],['이태원 루프키친','양식','서울 용산구 이태원동','용산구 이태원1동',37.5342,126.994,['데이트 맛집','안주 맛집'],44,8],['문래 철공소펍','주점','서울 영등포구 문래동','영등포구 문래동',37.5165,126.895,['데이트 맛집','안주 맛집'],33,9],['여의도 퇴근한상','한식','서울 영등포구 여의도동','영등포구 여의동',37.5217,126.924,['안주 맛집'],30,4],['합정 골목피자','양식','서울 마포구 합정동','마포구 합정동',37.5495,126.914,['데이트 맛집'],37,3],['왕십리 곱창마을','한식','서울 성동구 행당동','성동구 행당1동',37.5615,127.037,['안주 맛집'],40,6],['강남 오늘파스타','양식','서울 강남구 역삼동','강남구 역삼1동',37.5012,127.038,['데이트 맛집'],39,3],['봉천 시장국수','한식','서울 관악구 봉천동','관악구 청룡동',37.4824,126.951,['가성비 맛집'],24,1],['천호 숯불마당','한식','서울 강동구 천호동','강동구 천호2동',37.5385,127.125,['안주 맛집'],36,5],['창동 엄마손백반','한식','서울 도봉구 창동','도봉구 창1동',37.6485,127.044,['가성비 맛집'],28,2],['불광 산골닭집','한식','서울 은평구 불광동','은평구 불광1동',37.6106,126.929,['가성비 맛집','안주 맛집'],34,4]].map((p,i)=>({id:'seed-'+(i+1),name:p[0],foodCategory:p[1],address:p[2],dong:p[3],lat:p[4],lng:p[5],tags:p[6],likes:p[7],dislikes:p[8],note:'자취생들이 추천한 동네 맛집'}));

    function toast(msg){const e=$('#toast');e.textContent=msg;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),2200)}function score(p){return p.likes-p.dislikes}function visible(){let rows=places.filter(p=>(!savedMode||saved.has(p.id))&&(!category||p.tags.includes(category)));if(!savedMode&&primary==='top7'){const groups={};rows.forEach(p=>(groups[p.dong]??=[]).push(p));rows=Object.values(groups).flatMap(g=>g.sort((a,b)=>score(b)-score(a)||b.likes-a.likes).slice(0,7))}return rows.sort((a,b)=>score(b)-score(a)||b.likes-a.likes)}
    function colorFor(id,rows=visible()){const index=rows.findIndex(p=>p.id===id);return COLORS[(index<0?0:index)%COLORS.length]}function updateAdminUI(){document.body.classList.toggle('admin-mode',adminMode);$('#adminToggle').classList.toggle('active',adminMode);$('#adminToggle').title=adminMode?'관리자 모드 종료':'관리자 모드'}function updateFilters(){$$('[data-primary]').forEach(b=>{b.classList.toggle('active',b.dataset.primary===primary&&!savedMode);b.disabled=savedMode});$$('[data-category]').forEach(b=>b.classList.toggle('active',b.dataset.category===category));$('#savedFilter').classList.toggle('active',savedMode);$('#savedCount').textContent=saved.size}function render(){const rows=visible();if(activeId&&!rows.some(p=>p.id===activeId))activeId=null;$('#visibleCount').textContent=rows.length;$('#list').innerHTML=rows.length?rows.map((p,i)=>`<div class="restaurant ${p.id===activeId?'active':''}" data-id="${p.id}" role="button" tabindex="0"><span class="rank" style="background:${COLORS[i%COLORS.length]}">${i+1}</span><span class="rmeta"><span class="tags">${p.tags.join(' · ')}</span><b>${p.name}</b><span class="address">${p.address}</span></span><span class="mini-save ${saved.has(p.id)?'on':''}">${saved.has(p.id)?'♥':'♡'}</span><span class="admin-actions"><button class="admin-action" data-admin-edit="${p.id}">수정</button><button class="admin-action delete" data-admin-delete="${p.id}">삭제</button></span></div>`).join(''):'<div class="empty">조건에 맞는 맛집이 없어요.<br>필터를 바꾸거나 새 맛집을 등록해 보세요.</div>';$('#list').querySelectorAll('.restaurant[data-id]').forEach(card=>{card.onclick=e=>{if(e.target.closest('.admin-action'))return;selectFromList(card.dataset.id)};card.onkeydown=e=>{if((e.key==='Enter'||e.key===' ')&&!e.target.closest('.admin-action')){e.preventDefault();selectFromList(card.dataset.id)}}});$$('[data-admin-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();openAdminEdit(b.dataset.adminEdit)});$$('[data-admin-delete]').forEach(b=>b.onclick=e=>{e.stopPropagation();deletePlaceAd
